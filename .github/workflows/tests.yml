name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock moto freezegun
          pip install tabulate azure-identity azure-mgmt-resource azure-mgmt-network azure-mgmt-compute azure-mgmt-storage azure-mgmt-sql boto3 google-cloud-compute

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: |
          pytest --cov=. --cov-fail-under=80

      - name: Tests passed - Scan will be triggered
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "✅ All tests passed on main branch!"
          echo "🚀 Kernel-Guard scan will be triggered automatically..."
